# Reference workflow: map Repository secrets → job env (one entry per supported name).
# Add matching secrets under Settings → Secrets and variables → Actions.
# Values are never printed; missing secrets appear as empty env vars.
#
# See .github/SECRETS.md for descriptions and gh CLI examples.

name: Inject repository secrets as job env

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  env-from-secrets:
    runs-on: ubuntu-latest
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
      LANGSMITH_API_KEY: ${{ secrets.LANGSMITH_API_KEY }}
      VOYAGE_API_KEY: ${{ secrets.VOYAGE_API_KEY }}
      CANVAS_API_TOKEN: ${{ secrets.CANVAS_API_TOKEN }}
      GITHUB_CLIENT_SECRET: ${{ secrets.GITHUB_CLIENT_SECRET }}
      LM_STUDIO_API_KEY: ${{ secrets.LM_STUDIO_API_KEY }}
      OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL != '' && secrets.OPENAI_BASE_URL || 'http://localhost:1234/v1' }}
      NIST_EVAL_MODEL: ${{ secrets.NIST_EVAL_MODEL != '' && secrets.NIST_EVAL_MODEL || 'unrestricted-knowledge-will-not-refuse-15b' }}
      LM_STUDIO_BASE_URL: ${{ secrets.LM_STUDIO_BASE_URL }}
      LM_STUDIO_API: ${{ secrets.LM_STUDIO_API }}
      OLLAMA_HOST: ${{ secrets.OLLAMA_HOST }}
      CHAT_MODEL: ${{ secrets.CHAT_MODEL }}
      EMBEDDING_MODEL: ${{ secrets.EMBEDDING_MODEL }}
      RALPH_LOCAL_MODEL: ${{ secrets.RALPH_LOCAL_MODEL }}
      RALPH_MODEL_PROVIDER: ${{ secrets.RALPH_MODEL_PROVIDER }}
      DOCKER_HOST: ${{ secrets.DOCKER_HOST }}
      CANVAS_BASE_URL: ${{ secrets.CANVAS_BASE_URL }}
      RD_AGENT_PATH: ${{ secrets.RD_AGENT_PATH }}
      ADK_RALPH_PATH: ${{ secrets.ADK_RALPH_PATH }}
      RD_AGENT_MCP_EXEC_AGENTS: ${{ secrets.RD_AGENT_MCP_EXEC_AGENTS }}
      # Optional: OpenCode / extra LLM providers (same names OpenCode reads from the environment)
      OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      GOOGLE_GENERATIVE_AI_API_KEY: ${{ secrets.GOOGLE_GENERATIVE_AI_API_KEY }}
      LMSTUDIO_API_KEY: ${{ secrets.LMSTUDIO_API_KEY }}
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}

    steps:
      - name: Checkout (report script)
        uses: actions/checkout@v4

      - name: Report which expected keys are non-empty (names only)
        run: python scripts/gh_actions_secret_presence_report.py

      - name: Write summary
        run: |
          echo "## Secret → env wiring" >> "$GITHUB_STEP_SUMMARY"
          echo "This job maps **Repository secrets** to \`env:\` entries. See \`.github/SECRETS.md\`." >> "$GITHUB_STEP_SUMMARY"
          echo "No secret values are written to the log." >> "$GITHUB_STEP_SUMMARY"
