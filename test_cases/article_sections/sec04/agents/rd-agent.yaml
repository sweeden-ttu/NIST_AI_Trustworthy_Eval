agent:
  name: rd-agent-article-sec04
  type: rd-agent
  model: ibm/granite-4-h-tiny
  embedding_model: text-embedding-nomic-embed-text-v1.5
  provider: lm_studio

command:
  module: rdagent
  scenario: data_science
  args:
    - --task
    - >-
      Iterative refinement pass for IEEEtran article section `Literature Review and Positioning` in `src/sec/4_literature_review.tex`. **Prerequisites:** the full 14-prompt NIST Quiz battery has been run. **Primary ground truth:** `output/results/nist_eval_latest.json` (top-level `items` with numeric `id` 1–14, each with `prompt`, `response`, `error`; item 8 may include a `note` about the 2-turn thread after item 7), `output/results/nist_quiz_scores.json` (object `scores` whose JSON keys are the strings 1 through 14 and values are `C`, `P`, or `N` per `homework-assignment.pdf`), optional `output/results/nist_rubric_table.tex`, and prompt text parity via `scripts/nist_quiz_prompts.py`. **Rubric source of truth:** `homework-assignment.pdf` (repo root). Section focus: connect related work to **NIST AI RMF** trustworthiness characteristics (valid/reliable, safe, secure & resilient, explainable/interpretable, privacy-enhanced, fair, accountable & transparent) as reflected in the questionnaire. **Do not** treat legacy crypto coursework as primary empirical ground truth unless the section explicitly cites it. **Common goals:** keep LaTeX IEEE-safe; use \strength, \weakness, \suggestion macros from `src/review_macros.tex` where this section uses review-style annotations. **Artifact refresh:** `python scripts/run_coursework_outputs.py` regenerates NIST eval JSON (dry-run by default) and the rubric TeX when scores exist—per `test_cases/CONFIG`. Do not treat legacy toy-crypto figures or q1–q3 coursework JSON as ground truth unless this section explicitly cites them. **Output:** write a merge-ready snippet to `output/article_iterations/sec04/rd-agent-revision.tex` (section body only, no \documentclass).
    - --output
    - output/article_iterations/sec04/rd-agent

environment:
  LM_STUDIO_BASE_URL: http://192.168.0.13:1234/v1
  LITELLM_OPENAI_API_BASE: http://192.168.0.13:1234/v1
  OPENAI_API_BASE: http://192.168.0.13:1234/v1
  LITELLM_OPENAI_API_KEY: lm-studio
  EMBEDDING_MODEL: text-embedding-nomic-embed-text-v1.5

chroma:
  collection: research
  metadata:
    phase: article_iteration
    question_id: article-sec04
    agent_type: rd-agent
    section_tex: src/sec/4_literature_review.tex

tools:
  - name: file_write
    description: Revised section snippet (LaTeX body)
    output: output/article_iterations/sec04/rd-agent-revision.tex
  - name: json_write
    description: Optional structured diff notes / checklist
    output: output/article_iterations/sec04/revision-notes.json

retry:
  max_attempts: 3
  backoff: exponential

timeout: 600

llm_calls:
  - purpose: section_audit
    model: ibm/granite-4-h-tiny
    prompt_template: |
      Section `Literature Review and Positioning` (`src/sec/4_literature_review.tex`). Current text:
      ---
      {section_source}
      ---
      List concrete mismatches vs NIST artifacts (`output/results/nist_eval_latest.json`, `output/results/nist_quiz_scores.json`, optional `output/results/nist_rubric_table.tex`, `homework-assignment.pdf`, `scripts/nist_quiz_prompts.py`). Flag any claim not supported by those sources. JSON only.
  - purpose: section_rewrite
    model: ibm/granite-4-h-tiny
    prompt_template: |
      Apply fixes from audit: {audit}
      Produce improved LaTeX fragment for the same section, preserving \section heading line.
