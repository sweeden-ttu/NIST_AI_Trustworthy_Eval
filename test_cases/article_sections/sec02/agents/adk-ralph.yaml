agent:
  name: adk-ralph-article-sec02
  type: adk-ralph
  model: granite4:3b
  provider: ollama

command:
  binary: cargo
  args:
    - run
    - --
    - >-
      NIST consistency + LaTeX hygiene for `src/sec/2_experimental_methodology.tex` (Experimental Methodology). Under `output/article_iterations/sec02/adk-ralph/`, add or run a small helper (Rust or Python) that: (1) Verifies `output/results/nist_eval_latest.json` exists and that `items[].id` covers integers 1–14 uniquely; (2) Verifies `output/results/nist_quiz_scores.json` contains `scores` with every JSON key from the strings 1 through 14; (3) Strips trailing whitespace and checks brace balance on the section .tex file; (4) Lists paths from \includegraphics commands in that section and reports only missing files that are actually referenced; (5) Emits `report.md` and `latex-hygiene.json` with findings. Mention item 7→8 threading if item 8 appears in eval JSON. Section-specific emphasis: Check that described driver and env vars match keys present in `nist_eval_latest.json` (model, base_url, temperature). Do not remove substantive narrative; structural fixes and reports only. Re-run after a fresh `uv run python scripts/run_nist_llm_evaluation.py` when raw responses change.
  working_dir: output/article_iterations/sec02/adk-ralph

environment:
  OLLAMA_HOST: http://localhost:11434
  RALPH_MODEL_PROVIDER: ollama
  RALPH_LOCAL_MODEL: granite4:3b

chroma:
  collection: research
  metadata:
    phase: article_iteration
    question_id: article-sec02
    agent_type: adk-ralph
    section_tex: src/sec/2_experimental_methodology.tex

tools:
  - name: generate_json
    description: Machine-readable report (JSON coverage, graphics paths, warnings)
    output: output/article_iterations/sec02/adk-ralph/latex-hygiene.json

artifacts:
  - prd.md
  - design.md
  - tasks.json

retry:
  max_attempts: 2
  backoff: linear

timeout: 900

phases:
  prd:
    prompt: |
      PRD: validate `src/sec/2_experimental_methodology.tex` against NIST eval JSON, rubric scores JSON, and basic LaTeX sanity. Check that described driver and env vars match keys present in `nist_eval_latest.json` (model, base_url, temperature).
  architect:
    prompt: |
      Design: parse eval JSON for items 1–14; parse scores keys; parse .tex for includegraphics; write Markdown + JSON under output/article_iterations/sec02/adk-ralph/.
  loop:
    prompt: |
      Implement minimal CLI; document rerun after `uv run python scripts/run_nist_llm_evaluation.py` when updating raw responses.
