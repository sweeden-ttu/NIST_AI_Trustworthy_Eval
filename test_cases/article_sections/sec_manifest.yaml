# Section index for ieee_journal body (\input order matches ieee_journal.tex)
# Pair each entry with agents under secNN/agents/{rd-agent,adk-ralph}.yaml
sections:
  - id: sec00
    tex: src/sec/0_abstract.tex
    title: Executive Summary
  - id: sec01
    tex: src/sec/1_technical_contribution.tex
    title: Technical Contribution
  - id: sec02
    tex: src/sec/2_experimental_methodology.tex
    title: Experimental Methodology
  - id: sec03
    tex: src/sec/3_results_validation.tex
    title: Results and Claims Validation
  - id: sec04
    tex: src/sec/4_literature_review.tex
    title: Literature Review and Positioning
  - id: sec05
    tex: src/sec/5_presentation_clarity.tex
    title: Presentation and Clarity
  - id: sec06
    tex: src/sec/6_detailed_comments.tex
    title: Detailed Technical Comments
  - id: sec07
    tex: src/sec/7_questions_authors.tex
    title: Questions for Authors
  - id: sec08
    tex: src/sec/8_minor_issues.tex
    title: Minor Issues
  - id: sec09
    tex: src/sec/9_meta_review.tex
    title: Meta-Review and Integration

iteration_protocol:
  - >-
    Run the full NIST questionnaire battery from the repo root (uv run python scripts/run_nist_llm_evaluation.py;
    use uv run python scripts/verify_nist_prompt_inventory.py to check the 14-prompt inventory without an API). There is no per-item CLI; items 7 and 8 use a 2-turn thread in the driver when both run.
  - >-
    Record human (or documented) Compliant / Partially Compliant / Non-Compliant labels in
    output/results/nist_quiz_scores.json per homework-assignment.pdf.
  - >-
    Optionally emit LaTeX rubric table: uv run python scripts/emit_nist_rubric_table.py writes output/results/nist_rubric_table.tex.
  - >-
    For each secNN (typically sec03 soon after scores exist, then sec00/sec09, then others): run rd-agent from
    secNN/agents/rd-agent.yaml; merge output/article_iterations/secNN/rd-agent-revision.tex into src/sec/*.tex after review.
  - >-
    Run adk-ralph from secNN/agents/adk-ralph.yaml for JSON coverage / LaTeX hygiene reports; apply patches manually.
  - >-
    cd src && latexmk -pdf -interaction=nonstopmode ieee_journal.tex; fix until clean; repeat passes as needed.

prerequisites:
  required:
    - output/results/nist_eval_latest.json
    - output/results/nist_quiz_scores.json
    - homework-assignment.pdf
    - scripts/nist_quiz_prompts.py
  optional:
    - output/results/nist_rubric_table.tex
