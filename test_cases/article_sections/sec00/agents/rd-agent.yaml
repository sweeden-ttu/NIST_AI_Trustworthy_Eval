agent:
  name: rd-agent-article-sec00
  type: rd-agent
  model: ibm/granite-4-h-tiny
  embedding_model: text-embedding-nomic-embed-text-v1.5
  provider: lm_studio

command:
  module: rdagent
  scenario: data_science
  args:
    - --task
    - >-
      Iterative refinement pass for IEEEtran article section `Executive Summary` in `src/sec/0_abstract.tex`. **Prerequisites:** the full 14-prompt NIST Quiz battery has been run. **Primary ground truth:** `output/results/nist_eval_latest.json` (top-level `items` with numeric `id` 1–14, each with `prompt`, `response`, `error`; item 8 may include a `note` about the 2-turn thread after item 7), `output/results/nist_quiz_scores.json` (object `scores` whose JSON keys are the strings 1 through 14 and values are `C`, `P`, or `N` per `homework-assignment.pdf`), optional `output/results/nist_rubric_table.tex`, and prompt text parity via `scripts/nist_quiz_prompts.py`. **Rubric source of truth:** `homework-assignment.pdf` (repo root). Section focus: **executive synthesis** across **all 14** questionnaire items—themes, trustworthiness takeaways, and the evaluated **model** string from `nist_eval_latest.json`; if you summarize compliance, align counts or patterns with `scores` in `nist_quiz_scores.json`. Explicitly note **item 7→8 threading** if either item is discussed. **Common goals:** keep LaTeX IEEE-safe; use \strength, \weakness, \suggestion macros from `src/review_macros.tex` where this section uses review-style annotations. **Legacy crypto coursework** (`scripts/run_coursework_outputs.py`, `output/diagrams/`, q1–q3 JSON) is **out of scope** unless this section explicitly cites those artifacts. **Output:** write a merge-ready snippet to `output/article_iterations/sec00/rd-agent-revision.tex` (section body only, no \documentclass).
    - --output
    - output/article_iterations/sec00/rd-agent

environment:
  LM_STUDIO_BASE_URL: http://192.168.0.13:1234/v1
  LITELLM_OPENAI_API_BASE: http://192.168.0.13:1234/v1
  OPENAI_API_BASE: http://192.168.0.13:1234/v1
  LITELLM_OPENAI_API_KEY: lm-studio
  EMBEDDING_MODEL: text-embedding-nomic-embed-text-v1.5

chroma:
  collection: research
  metadata:
    phase: article_iteration
    question_id: article-sec00
    agent_type: rd-agent
    section_tex: src/sec/0_abstract.tex

tools:
  - name: file_write
    description: Revised section snippet (LaTeX body)
    output: output/article_iterations/sec00/rd-agent-revision.tex
  - name: json_write
    description: Optional structured diff notes / checklist
    output: output/article_iterations/sec00/revision-notes.json

retry:
  max_attempts: 3
  backoff: exponential

timeout: 600

llm_calls:
  - purpose: section_audit
    model: ibm/granite-4-h-tiny
    prompt_template: |
      Section `Executive Summary` (`src/sec/0_abstract.tex`). Current text:
      ---
      {section_source}
      ---
      List concrete mismatches vs NIST artifacts (`output/results/nist_eval_latest.json`, `output/results/nist_quiz_scores.json`, optional `output/results/nist_rubric_table.tex`, `homework-assignment.pdf`, `scripts/nist_quiz_prompts.py`). Flag any claim not supported by those sources. JSON only.
  - purpose: section_rewrite
    model: ibm/granite-4-h-tiny
    prompt_template: |
      Apply fixes from audit: {audit}
      Produce improved LaTeX fragment for the same section, preserving \section heading line.
