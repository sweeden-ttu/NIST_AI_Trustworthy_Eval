agent:
  name: adk-ralph-q2-openssl-automation
  type: adk-ralph
  model: granite4:3b
  provider: ollama

command:
  binary: cargo
  args:
    - run
    - --
    - >-
      Create a Rust utility (or thin wrapper) that automates OpenSSL AES-128-ECB and
      AES-128-CBC encryption of a BMP input (e.g. assets/Secret.bmp): generate or accept
      key/IV, run openssl enc, optionally apply the 54-byte BMP header splice from
      plaintext to ciphertext for visualization, and write a small JSON manifest
      (paths, digests, command lines) for reproducible figures (q2-ecb-noise, q2-cbc-noise,
      header-fixed variants).
  working_dir: output/q2/adk-ralph

environment:
  OLLAMA_HOST: http://localhost:11434
  RALPH_MODEL_PROVIDER: ollama
  RALPH_LOCAL_MODEL: granite4:3b

chroma:
  collection: research
  metadata:
    phase: questions
    question_id: q2
    agent_type: adk-ralph

tools:
  - name: generate_diagram
    description: Mermaid pipeline diagram OpenSSL ECB/CBC + header-fix step
    output: figures/q2-openssl-pipeline.md
  - name: generate_table
    description: LaTeX table comparing file sizes and modes
    output: tables/q2-mode-comparison.tex
  - name: generate_json
    description: Manifest for homework submission bundle
    output: results/q2-adk-ralph.json

artifacts:
  - prd.md
  - design.md
  - tasks.json
  - bin/bmp-mode-lab

retry:
  max_attempts: 2
  backoff: linear

timeout: 900

phases:
  prd:
    prompt: |
      PRD: CLI to drive openssl enc for ECB/CBC on BMP, record key/IV in a secrets-safe
      way for coursework (e.g. env or local json gitignored), output ciphertext paths
      and optional header-fixed previews.
  architect:
    prompt: |
      Design: subprocess to openssl, BMP header extraction (first 54 bytes), splice
      utility, JSON manifest schema matching output/results/q2 expectations.
  loop:
    prompt: |
      Implement with tests using a tiny synthetic BMP if Secret.bmp missing in CI;
      document conda/OpenSSL version assumptions for rd-ralph-template reproducibility.
