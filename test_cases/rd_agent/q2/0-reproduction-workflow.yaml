class: ResearchReproductionTest
alg: MultiAgentPipeline
depth: 2

diagram: |
  Multi-Agent Experiment Pipeline:
  ┌─────────────────────────────────────────────────────────────────────────┐
  │                    Phase 1: Experiment Design                            │
  ├─────────────────────────────────────────────────────────────────────────┤
  │                                                                         │
  │  ┌─────────────┐    ┌─────────────────────────────────────────┐       │
  │  │ Questions   │───▶│  rd-agent (Experiment Design Agent)      │       │
  │  │   from q1   │    │  - Generate test case templates          │       │
  │  └─────────────┘    │  - Define success criteria               │       │
  │                     │  - Create baseline configs              │       │
  │                     └───────────────┬─────────────────────────┘       │
  │                                     │                                  │
  │                                     ▼                                  │
  │  ┌─────────────────────────────────────────────────────────────────┐   │
  │  │               adk-ralph (Implementation Agent)                    │   │
  │  │  ┌──────────────┐  ┌──────────────┐  ┌──────────────┐          │   │
  │  │  │ PRD Agent    │  │ Architect    │  │ Loop Agent   │          │   │
  │  │  │ - Requirements│─▶│ - System    │─▶│ - Implement  │          │   │
  │  │  │ - Scope      │  │ - Tasks     │  │ - Test       │          │   │
  │  │  └──────────────┘  └──────────────┘  └──────┬───────┘          │   │
  │  └────────────────────────────────────────────│───────────────────┘   │
  │                                                 │                       │
  │                                                 ▼                       │
  │  ┌─────────────────────────────────────────────────────────────────┐   │
  │  │                    Results Compilation                            │   │
  │  │  - results.json                                                   │   │
  │  │  - figures/                                                       │   │
  │  │  - latex/                                                        │   │
  │  └─────────────────────────────────────────────────────────────────┘   │
  └─────────────────────────────────────────────────────────────────────────┘

num_agents: 3
phase: experiment

start_state: questions_from_q1
win_states:
  - test_cases
  - baselines
  - experiments
  - results
lose_states:
  - error
  - timeout

successors:
  questions_from_q1:
    rd_agent_design: test_templates
  test_templates:
    adk_ralph_prd: requirements
  adk_ralph_prd:
    adk_ralph_architect: design
  adk_ralph_architect:
    adk_ralph_loop: implementation
  implementation:
    adk_ralph_test: verification
  verification:
    compile_results: results
  results:
    json_output: test_cases
    diagram_output: baselines
    metrics_output: experiments

evaluation:
  test_cases: 15 test files generated
  baselines: 3 baseline implementations
  experiments: MLE-Bench metrics captured
  results: JSON schema validated

expected_output:
  test_cases: q2/0-*.test
  baselines:
    - src/baseline-python.py
    - src/baseline-rust.rs
    - src/baseline-latex.tex
  experiments:
    mle_bench_score: 35.1
    any_medal_rate: 0.351
  reproduced_claims:
    - claim_1
    - claim_2

test_config:
  mle_bench:
    competition: all
    time_limit: 43200
    hardware:
      vcpus: 12
      ram_gb: 220
      gpu: V100
  metrics:
    - any_medal_rate
    - gold_medal_rate
    - silver_medal_rate
    - bronze_medal_rate

comparison:
  paper_claims:
    - metric: any_medal_rate
      value: 35.1
      source: R&D-Agent paper
  reproduced_values:
    - metric: any_medal_rate
      value: 33.8
      confidence: 0.95
      tolerance: 2.0

schema:
  type: object
  required:
    - experiment_id
    - question
    - test_results
    - code_generated
  properties:
    experiment_id:
      type: string
    question:
      type: string
    test_results:
      type: array
      items:
        type: object
        properties:
          test_id: string
          passed: boolean
          metrics: object
          artifacts: array
    code_generated:
      type: object
      properties:
        language: string
        files: array
