agent:
  name: adk-ralph-q3-tls-parse
  type: adk-ralph
  model: granite4:3b
  provider: ollama

command:
  binary: cargo
  args:
    - run
    - --
    - >-
      Build a Rust tool that parses Wireshark JSON or PDML exports (or tshark -T json)
      for TLS ClientHello/ServerHello: extract offered cipher suites, selected suite,
      protocol version, and SNI. Emit normalized JSON and CSV for building summary
      tables (compatible with q3-client-hello-table / q3-server-hello-summary workflows).
      Include mapping helpers from suite hex/id to human-readable KX/auth/cipher/MAC buckets.
  working_dir: output/q3/adk-ralph

environment:
  OLLAMA_HOST: http://localhost:11434
  RALPH_MODEL_PROVIDER: ollama
  RALPH_LOCAL_MODEL: granite4:3b

chroma:
  collection: research
  metadata:
    phase: questions
    question_id: q3
    agent_type: adk-ralph

tools:
  - name: generate_diagram
    description: Mermaid TLS handshake + classification flowchart
    output: figures/q3-tls-classification.md
  - name: generate_table
    description: LaTeX table stub for site × negotiated cipher
    output: tables/q3-suite-matrix.tex
  - name: generate_json
    description: Parsed handshake records for plotting scripts
    output: results/q3-adk-ralph.json

artifacts:
  - prd.md
  - design.md
  - tasks.json
  - bin/tls-handshake-parse

retry:
  max_attempts: 2
  backoff: linear

timeout: 900

phases:
  prd:
    prompt: |
      PRD: Parser CLI for TLS handshake fields from tshark/Wireshark JSON export;
      goal is homework Q3 tabulation across browsers and sites without manual copy-paste errors.
  architect:
    prompt: |
      Architecture: JSONL reader, TLS record detection, cipher list expansion,
      classification tables (IANA-style names optional), CSV + JSON writers.
  loop:
    prompt: |
      Implement with sample fixtures (sanitized pcaps or mock JSON). README documents
      capture workflow: two browsers, nine sites, where to save under output/diagrams/q3-wireshark/.
