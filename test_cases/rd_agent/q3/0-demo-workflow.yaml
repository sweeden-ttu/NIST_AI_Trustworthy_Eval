class: ResearchDemoTest
alg: MultiAgentPipeline
depth: 2

diagram: |
  Agentic Workflow Demo Pipeline:
  ┌─────────────────────────────────────────────────────────────────────────┐
  │                    Phase 3: Agent Execution (Parallel)                    │
  ├─────────────────────────────────────────────────────────────────────────┤
  │                                                                         │
  │    ┌─────────────────────┐         ┌─────────────────────┐           │
  │    │    rd-agent        │         │    adk-ralph        │           │
  │    │  (Python Analysis) │         │  (Rust + LaTeX)     │           │
  │    ├─────────────────────┤         ├─────────────────────┤           │
  │    │ - Data processing  │         │ - CLI tool          │           │
  │    │ - JSON results    │         │ - Diagram gen        │           │
  │    │ - Metrics         │         │ - Table gen          │           │
  │    └─────────┬───────────┘         └─────────┬───────────┘           │
  │              │                               │                        │
  │              │         ┌─────────────────────┘                        │
  │              │         │                                              │
  │              ▼         ▼                                              │
  │    ┌─────────────────────────────────────────────┐                   │
  │    │         Results Compilation                    │                   │
  │    │  - results.json                               │                   │
  │    │  - figures/                                   │                   │
  │    │  - sec/7_questions_authors.tex               │                   │
  │    └─────────────────────────────────────────────┘                   │
  └─────────────────────────────────────────────────────────────────────────┘

num_agents: 2
phase: agent
parallel: true

start_state: prompt
win_states:
  - python_results
  - rust_results
  - latex_results
  - compiled_results
lose_states:
  - error
  - timeout

successors:
  prompt:
    parallel:
      - rd_agent_python
      - adk_ralph_rust
      - adk_ralph_latex
  rd_agent_python:
    results_json: python_results
  adk_ralph_rust:
    results_json: rust_results
  adk_ralph_latex:
    results_json: latex_results
  python_results:
    compile: compiled_results
  rust_results:
    compile: compiled_results
  latex_results:
    compile: compiled_results

evaluation:
  python_results: JSON with metrics
  rust_results: Binary + JSON output
  latex_results: LaTeX table
  compiled_results: Complete results.json

expected_output:
  results_json: output/results.json
  figures:
    - output/diagrams/performance.pdf
    - output/diagrams/comparison.pdf
  latex:
    - sec/7_questions_authors.tex
    - tables/results.tex

languages:
  - python
  - rust
  - latex

schema:
  type: object
  required:
    - experiment_id
    - question
    - results
    - artifacts
  properties:
    experiment_id:
      type: string
    question:
      type: string
    results:
      type: object
      properties:
        python: object
        rust: object
        latex: object
    artifacts:
      type: array
      items:
        type: string
