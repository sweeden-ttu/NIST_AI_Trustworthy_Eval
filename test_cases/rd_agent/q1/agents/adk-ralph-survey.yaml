agent:
  name: adk-ralph-q1-aes-tooling
  type: adk-ralph
  model: granite4:3b
  provider: ollama

command:
  binary: cargo
  args:
    - run
    - --
    - >-
      Build a small Rust CLI that reads AES-128 round-state logs (or computes them from
      a minimal toy AES implementation), computes byte- and bit-level Hamming distance
      between paired traces (P vs P', K vs K'), and emits JSON plus optional CSV for
      plotting (q1-hamming-rounds style). Support flags for disabling ShiftRows and for
      plugging an alternate MixColumns matrix (M_new) per assignment Part B/C.
  working_dir: output/q1/adk-ralph

environment:
  OLLAMA_HOST: http://localhost:11434
  RALPH_MODEL_PROVIDER: ollama
  RALPH_LOCAL_MODEL: granite4:3b

chroma:
  collection: research
  metadata:
    phase: questions
    question_id: q1
    agent_type: adk-ralph

tools:
  - name: generate_diagram
    description: Emit Mermaid or markdown describing round-step dataflow vs Hamming plots
    output: figures/q1-aes-round-flow.md
  - name: generate_table
    description: LaTeX table template for Part D key-vs-plaintext flip comparison
    output: tables/q1-hamming-summary.tex
  - name: generate_json
    description: Structured experiment output for downstream scripts
    output: results/q1-adk-ralph.json

artifacts:
  - prd.md
  - design.md
  - tasks.json
  - bin/aes-hamming-tool

retry:
  max_attempts: 2
  backoff: linear

timeout: 900

phases:
  prd:
    prompt: |
      PRD for a Rust CLI: ingest two AES trace sequences (JSON lines or binary state
      dumps), align by round and step name, output Hamming distances and diff summaries
      for coursework Q1 (Parts A–D). Non-production; educational correctness only.
  architect:
    prompt: |
      Architecture: parser module, Hamming module (bit + byte), ablation switches
      (no ShiftRows, custom MixColumns matrix input path), JSON/CSV writers, tests
      with fixed all-zero key/plaintext and single-bit flip fixtures.
  loop:
    prompt: |
      Implement the CLI with clap subcommands: diff-traces, summarize-round, export-csv.
      Include unit tests for known vectors and README with example invocations matching
      test_cases/rd_agent/q1 expectations.
