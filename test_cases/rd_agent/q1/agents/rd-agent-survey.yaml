agent:
  name: rd-agent-q1-aes-diffusion
  type: rd-agent
  model: ibm/granite-4-h-tiny
  embedding_model: text-embedding-nomic-embed-text-v1.5
  provider: lm_studio

command:
  module: rdagent
  scenario: data_science
  args:
    - --task
    - >-
      CS 6343 Q1: Analyze AES-128 round structure, avalanche/diffusion, and ablations.
      Implement or reference toy SubBytes, ShiftRows, MixColumns, AddRoundKey with logged
      states (rounds 0–10). Compare P vs P' (one-bit plaintext flip) and K vs K' (one-bit
      key flip) with byte/bit Hamming distance after each step. Cover Part A baseline,
      Part B without ShiftRows, Part C with alternate MixColumns M_new, Part D key-flip
      tabulation. Summarize which round achieves practical diffusion and discuss a
      multi-plaintext (e.g. 10-variant) extension. Output must be reproducible and cite
      NIST/AES design references where appropriate.
    - --output
    - output/q1/rd-agent

environment:
  LM_STUDIO_BASE_URL: http://192.168.0.13:1234/v1
  LITELLM_OPENAI_API_BASE: http://192.168.0.13:1234/v1
  OPENAI_API_BASE: http://192.168.0.13:1234/v1
  LITELLM_OPENAI_API_KEY: lm-studio
  EMBEDDING_MODEL: text-embedding-nomic-embed-text-v1.5

chroma:
  collection: research
  metadata:
    phase: questions
    question_id: q1
    agent_type: rd-agent

tools:
  - name: file_write
    description: Write LaTeX or markdown notes for Q1 results and methodology
    output: output/q1/rd-agent/article-snippet.tex
  - name: json_write
    description: Write structured Q1 metrics (Hamming per round/step, ablation flags)
    output: results/q1-results.json
  - name: chroma_store
    description: Store embeddings in ChromaDB
    collection: research

retry:
  max_attempts: 3
  backoff: exponential

timeout: 600

llm_calls:
  - purpose: literature_review
    model: ibm/granite-4-h-tiny
    prompt_template: |
      Context: AES-128 diffusion, avalanche effect, Rijndael round function (SubBytes,
      ShiftRows, MixColumns, AddRoundKey), GF(2^8) xtime, and homework-style ablations.

      Sources (excerpt or paths): {papers}

      Extract:
      1. Definitions of diffusion and avalanche in block ciphers
      2. How each AES layer contributes to diffusion
      3. What removing ShiftRows or changing MixColumns should do to metrics
      4. Pitfalls of toy implementations vs production crypto

      Format as JSON matching the schema.
  - purpose: synthesis
    model: ibm/granite-4-h-tiny
    prompt_template: |
      Findings from analysis: {findings}

      Synthesize a concise report suitable for ieee_journal Q1 subsections:
      methodology bullets, expected figure captions (Hamming vs round/step), and
      interpretation of Parts A–D. Use LaTeX-safe text where needed.
